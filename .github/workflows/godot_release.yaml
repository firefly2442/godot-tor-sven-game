name: CI/CD - Godot Export

on:
  workflow_dispatch:  # Manual trigger

jobs:
  export-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y jq unzip tar

    - name: Get latest Godot release info
      id: release
      run: |
        release_json=$(curl -s https://api.github.com/repos/godotengine/godot/releases/latest)

        tag=$(echo "$release_json" | jq -r '.tag_name')
        linux_url=$(echo "$release_json" | jq -r '.assets[] | select(.name | test("stable_linux.x86_32.zip$")) | .browser_download_url')
        templates_url=$(echo "$release_json" | jq -r '.assets[] | select(.name | test("stable_export_templates.tpz$")) | .browser_download_url')

        echo "tag=$tag" >> $GITHUB_OUTPUT
        echo "linux_url=$linux_url" >> $GITHUB_OUTPUT
        echo "templates_url=$templates_url" >> $GITHUB_OUTPUT

    - name: Download Godot Linux Editor
      run: |
        curl -L "${{ steps.release.outputs.linux_url }}" -o godot-linux.zip
        unzip godot-linux.zip -d godot-bin
        chmod +x godot-bin/Godot*

    - name: Download and Install Export Templates
      run: |
        version_folder=$(echo "${{ steps.release.outputs.tag }}" | sed 's/-/./')
        mkdir -p ~/.local/share/godot/export_templates/$version_folder
        curl -L "${{ steps.release.outputs.templates_url }}" -o templates.tpz
        tar -xf templates.tpz -C ~/.local/share/godot/export_templates/$version_folder
        
    - name: Export Linux build
      run: |
        ./godot-bin/Godot* --headless --export-release "Linux" build/tor_sven_game.x86_64

    - name: Export Windows build
      run: |
        ./godot-bin/Godot* --headless --export-release "Windows Desktop" build/tor_sven_game.exe

    - uses: actions/upload-artifact@v4
      with:
        name: builds
        path: build/
